name: 构建 Windows 安装包

# 触发条件:推送 tag(v* 开头)时构建并发布
on:
  push:
    tags:
      - 'v*'
  # 也支持手动触发
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        run: npm install

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '时间轴便签 ${{ github.ref_name }}'
          releaseBody: '桌面便签应用 Windows 安装包'
          releaseDraft: false
          prerelease: false

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
