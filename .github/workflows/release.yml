name: 构建 Windows 安装包（Electron）

# 触发条件：推送 tag（v* 开头）时构建并发布
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 显式授予写权限，用于创建 Release
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 构建 Windows 安装包
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          name: 时间轴便签 ${{ github.ref_name }}
          body: 桌面便签应用 Windows 安装包（支持 Win7/10/11）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
